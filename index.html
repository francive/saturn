<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo Inmersivo - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        /* PANTALLA DE CARGA */
        #loader-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #saturn-logo {
            width: 120px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #progress-container {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #ffcc00;
            transition: width 0.3s;
        }

        #btn-start {
            display: none;
            padding: 12px 30px;
            background: #ffcc00;
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        #btn-start:hover { background: #ffe066; }

        #audio-container {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px; border-radius: 8px;
            backdrop-filter: blur(5px); color: white;
            z-index: 100; display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <img id="saturn-logo" src="assets/textures/saturn_icon.png" alt="Logo">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button id="btn-start">Comenzar Experiencia</button>
    </div>

    <div id="audio-container">
        <label>Volumen</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="backgroundAudio" loop>
        <source src="assets/audio/saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.136.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        // --- GESTOR DE CARGA ---
        const loadingManager = new THREE.LoadingManager();
        const progressBar = document.getElementById('progress-bar');
        const btnStart = document.getElementById('btn-start');
        const progressContainer = document.getElementById('progress-container');

        loadingManager.onProgress = (url, itemsLoaded, itemsTotal) => {
            const progress = (itemsLoaded / itemsTotal) * 100;
            progressBar.style.width = progress + '%';
        };

        loadingManager.onLoad = () => {
            progressContainer.style.display = 'none';
            btnStart.style.display = 'block';
        };

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader(loadingManager);
        textureLoader.setCrossOrigin('anonymous');

        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || 'cliente_01'; 

        // LUCES
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        // FONDO
        const bgTexture = textureLoader.load('./assets/textures/estrellas.jpg'); 
        const backgroundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(800, 480), 
            new THREE.MeshBasicMaterial({ map: bgTexture, transparent: true, depthWrite: false })
        );
        scene.add(backgroundPlane);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // SATURNO
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshBasicMaterial({ map: textureLoader.load('./assets/textures/saturno.jpg') })
        );
        scene.add(saturn);

        const atmosphereStars = new THREE.Group(); 
        const ringGroup = new THREE.Group();        
        const photoGroup = new THREE.Group(); 
        ringGroup.rotation.x = Math.PI * 0.15;
        scene.add(atmosphereStars, ringGroup);
        ringGroup.add(photoGroup);

        const destelloTexture = textureLoader.load('./assets/textures/destello.png');

        // FOTOS DINÁMICAS (Auto-detección)
        function cargarSiguienteFoto(index) {
            const ruta = `./assets/photos/${user}/foto (${index}).jpg`;
            textureLoader.load(
                ruta, 
                (texture) => {
                    const aspect = texture.image.width / texture.image.height;
                    const photoMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0 });
                    const photoSprite = new THREE.Sprite(photoMat);
                    
                    if (aspect > 1) photoSprite.scale.set(0.6 * aspect, 0.6, 1);
                    else photoSprite.scale.set(0.5, 0.5 / aspect, 1);

                    const angle = Math.random() * Math.PI * 2;
                    const radius = 2.2 + Math.random() * 2.5; 
                    photoSprite.position.set(Math.cos(angle) * radius, 0.3, Math.sin(angle) * radius);
                    
                    photoSprite.visible = false;
                    photoGroup.add(photoSprite);
                    cargarSiguienteFoto(index + 1);
                },
                undefined,
                () => { console.log("Fotos listas."); }
            );
        }
        cargarSiguienteFoto(1);

        // EVENTO DE INICIO
        btnStart.addEventListener('click', () => {
            document.getElementById('loader-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader-screen').style.display = 'none';
                document.getElementById('backgroundAudio').play();
            }, 500);
        });

        document.getElementById('volumeRange').addEventListener('input', (e) => {
            document.getElementById('backgroundAudio').volume = e.target.value;
        });

        camera.position.set(0, 5, 15);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            saturn.rotation.y += 0.001;
            ringGroup.rotation.y += 0.0005; 

            // Movimiento del fondo
            const vector = new THREE.Vector3(0, 0, -150); 
            vector.applyQuaternion(camera.quaternion);
            backgroundPlane.position.copy(camera.position).add(vector);
            backgroundPlane.quaternion.copy(camera.quaternion);

            // Aparición de fotos por cercanía
            const dist = camera.position.distanceTo(scene.position);
            const opacity = dist < 9 ? 1 : 0; 
            photoGroup.children.forEach(p => {
                p.material.opacity = opacity;
                p.visible = dist < 9;
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
