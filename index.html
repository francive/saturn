<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo Inmersivo - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #audio-container {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1); padding: 10px;
            border-radius: 8px; backdrop-filter: blur(5px);
            color: white; z-index: 100; display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="audio-container">
        <label>Volumen</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="backgroundAudio" loop>
        <source src="assets/audio/saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();
        
        // --- LUCES (Para que el planeta NO se vea negro) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // Luz general
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // --- CONFIGURACIÓN DE RUTAS (Según tu GitHub) ---
        const urlParams = new URLSearchParams(window.location.search);
        const clienteFolder = urlParams.get('user') || 'cliente_01'; 

        // 1. FONDO ESTELAR
        const bgTexture = textureLoader.load('assets/textures/estrellas.jpg'); 
        const bgGeometry = new THREE.SphereGeometry(500, 64, 64);
        const bgMaterial = new THREE.MeshBasicMaterial({ map: bgTexture, side: THREE.BackSide });
        const backgroundSky = new THREE.Mesh(bgGeometry, bgMaterial);
        scene.add(backgroundSky);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. SATURNO
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshStandardMaterial({ map: textureLoader.load('assets/textures/saturno.jpg') })
        );
        scene.add(saturn);

        // 3. GRUPOS
        const ringGroup = new THREE.Group();
        ringGroup.rotation.x = Math.PI * 0.15;
        scene.add(ringGroup);

        const destelloTex = textureLoader.load('assets/textures/destello.png');

        // --- ESTRELLAS DE LOS ANILLOS (Más notorias) ---
        for (let i = 0; i < 3500; i++) {
            const starMat = new THREE.SpriteMaterial({ 
                map: destelloTex, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8 
            });
            const star = new THREE.Sprite(starMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.8 + Math.pow(Math.random(), 0.5) * 3.2; 
            star.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 0.12, Math.sin(angle) * radius);
            const s = Math.random() * 0.08 + 0.02;
            star.scale.set(s, s, 1);
            ringGroup.add(star);
        }

        // --- FOTOS (Colores normales y en los anillos) ---
        const photoGroup = new THREE.Group();
        ringGroup.add(photoGroup);

        for (let i = 1; i <= 40; i++) {
            const photoTex = textureLoader.load(`assets/photos/${clienteFolder}/foto (${i}).jpg`);
            // Se quita AdditiveBlending para que se vean normales
            const photoMat = new THREE.SpriteMaterial({ map: photoTex, transparent: true, opacity: 0 });
            const photo = new THREE.Sprite(photoMat);

            const angle = (i / 40) * Math.PI * 2;
            const radius = 2.2 + Math.random() * 2.5; // Esparcidas dentro del anillo
            photo.position.set(Math.cos(angle) * radius, 0.2, Math.sin(angle) * radius);
            photo.scale.set(0.6, 0.6, 1);
            photoGroup.add(photo);
        }

        // --- AUDIO ---
        const audio = document.getElementById('backgroundAudio');
        window.addEventListener('click', () => { audio.play(); }, { once: true });
        document.getElementById('volumeRange').addEventListener('input', (e) => { audio.volume = e.target.value; });

        camera.position.set(0, 5, 12);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            saturn.rotation.y += 0.002;
            ringGroup.rotation.y += 0.0005;

            const dist = camera.position.distanceTo(scene.position);
            // Mostrar fotos solo al acercarse
            photoGroup.children.forEach(p => p.material.opacity = dist < 10 ? 1 : 0);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
