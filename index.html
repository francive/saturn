<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo Inmersivo para Ti - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        
        #audio-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            color: white;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        input[type=range] { cursor: pointer; }
    </style>
</head>
<body>

    <div id="audio-container">
        <label for="volumeRange">Volumen</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="backgroundAudio" loop>
        <source src="saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();

        // MANEJO DE AUDIO
        const audio = document.getElementById('backgroundAudio');
        const volumeSlider = document.getElementById('volumeRange');
        
        window.addEventListener('click', () => {
            audio.play();
        }, { once: true });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // 1. FONDO
        const bgTexture = textureLoader.load('estrellas.jpg'); 
        const bgGeometry = new THREE.PlaneGeometry(200, 120);
        const bgMaterial = new THREE.MeshBasicMaterial({ 
            map: bgTexture, 
            transparent: true, depthWrite: false
        });
        const backgroundPlane = new THREE.Mesh(bgGeometry, bgMaterial);
        scene.add(backgroundPlane);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. SATURNO CON RESPLANDOR ATMOSFÉRICO
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshBasicMaterial({ map: textureLoader.load('saturno.jpg') })
        );
        scene.add(saturn);

        const atmosGlowMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize( normalMatrix * normal );
                    gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                void main() {
                    float intensity = pow( 0.6 - dot( vNormal, vec3( 0.0, 0.0, 1.0 ) ), 4.0 );
                    gl_FragColor = vec4( 1.0, 0.9, 0.7, 1.0 ) * intensity;
                }
            `,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending,
            transparent: true
        });
        const atmosGlow = new THREE.Mesh(new THREE.SphereGeometry(1.35, 64, 64), atmosGlowMat);
        scene.add(atmosGlow);

        // 3. GRUPOS DE ANILLOS Y PALABRAS
        const ringGroup = new THREE.Group();
        const wordsGroup = new THREE.Group();
        ringGroup.rotation.x = Math.PI * 0.15;
        scene.add(ringGroup);
        ringGroup.add(wordsGroup);

        // --- NUEVO: ANILLO SÓLIDO BRILLANTE DOBLE CARA (GLOWING DISK) ---
        // Geometría sólida de disco con hueco central (como image_11.png)
        const solidRingGeo = new THREE.RingGeometry(2.2, 4.0, 128);
        
        // Shader para crear el efecto de brillo denso
        const solidRingMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                void main() {
                    // Genera un desvanecimiento suave hacia el centro del anillo
                    float intensity = smoothstep(0.0, 1.0, vUv.y);
                    // Color amarillo incandescente (como image_11.png)
                    gl_FragColor = vec4(1.0, 0.85, 0.3, 1.0) * intensity;
                }
            `,
            transparent: true,
            depthWrite: false,
            side: THREE.DoubleSide, // DOBLE CARA (Visible desde arriba y abajo)
            blending: THREE.AdditiveBlending // Crucial para que el brillo se sume
        });

        const solidRing = new THREE.Mesh(solidRingGeo, solidRingMat);
        // Posicionado ligeramente ABAJO para que las letras floten arriba
        solidRing.position.y = -0.1;
        ringGroup.add(solidRing);

        // --- CORRECCIÓN FINAL PARTICULAS: Polvo etéreo que da textura ---
        const destelloTexture = textureLoader.load('destello.png');
        const starMat = new THREE.SpriteMaterial({ 
            map: destelloTexture, 
            transparent: true, 
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            opacity: 0.8
        });

        // Usamos menos partículas pero más dispersas para dar textura sobre el disco sólido (como image_10.png)
        for (let i = 0; i < 4000; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.pow(Math.random(), 0.5) * 3.8; 
            const star = new THREE.Sprite(starMat.clone());
            const s = Math.random() * 0.08 + 0.02; 
            star.scale.set(s, s, 1);
            star.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 0.15, Math.sin(angle) * radius);
            ringGroup.add(star);
        }

        // 4. PALABRAS (Ahora flotando SOBRE el disco sólido)
        const loveWords = ["Te amo", "✨ Eres muy especial ✨", "Flores amarillas", "Nuestro Amor", "Te adoro", "Siempre brillas", "Flores para ti", "Infinito", "Destino", "Te adoro", "Gracia", "Cielo"];
        
        for(let i = 0; i < 400; i++) {
            const randomText = loveWords[i % loveWords.length];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 128; canvas.height = 32;
            ctx.shadowColor = "white"; ctx.shadowBlur = 5; ctx.font = '28px Georgia'; ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center'; ctx.fillText(randomText, 64, 28);

            const wordSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: new THREE.CanvasTexture(canvas), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            }));

            const angle = Math.random() * Math.PI * 2;
            const radius = 2.2 + Math.pow(Math.random(), 0.5) * 3.8; 
            // Posicionadas para que floten SOBRE el disco sólido de polvo
            wordSprite.position.set(Math.cos(angle) * radius, 0.15, Math.sin(angle) * radius);
            wordSprite.scale.set(0.1, 0.025, 1); 
            wordSprite.material.opacity = 0;
            wordsGroup.add(wordSprite);
        }

        // 5. ESTRELLAS FUGACES
        const shootingStars = [];
        const shootingStarMat = new THREE.SpriteMaterial({
            map: destelloTexture, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false
        });

        function spawnShootingStar() {
            const star = new THREE.Sprite(shootingStarMat.clone());
            star.position.set((Math.random()-0.5)*150, (Math.random()-0.5)*100, -45); 
            star.scale.set(6, 0.3, 1); 
            star.userData.velocity = new THREE.Vector3((Math.random()-0.5)*15, (Math.random()-0.5)*10, 0);
            star.userData.opacity = 1.0;
            scene.add(star);
            shootingStars.push(star);
        }

        camera.position.set(0, 3, 10);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            saturn.rotation.y += 0.001;
            ringGroup.rotation.y += 0.0003;

            // Fondo con seguimiento
            const vector = new THREE.Vector3(0, 0, -50); 
            vector.applyQuaternion(camera.quaternion);
            backgroundPlane.position.copy(camera.position).add(vector);
            backgroundPlane.quaternion.copy(camera.quaternion);

            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const star = shootingStars[i];
                star.position.add(star.userData.velocity);
                star.userData.opacity -= 0.02; 
                star.material.opacity = star.userData.opacity;
                if (star.userData.opacity <= 0) {
                    scene.remove(star);
                    shootingStars.splice(i, 1);
                }
            }

            if (Math.random() < 0.012) spawnShootingStar();

            const dist = camera.position.distanceTo(scene.position);
            if (dist < 7.5) {
                // Baja brillo polvo para resaltar palabras
                wordsGroup.children.forEach(w => w.material.opacity = 1);
                solidRing.material.opacity = 0.5;
            } else {
                wordsGroup.children.forEach(w => w.material.opacity = 0);
                solidRing.material.opacity = 1;
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
