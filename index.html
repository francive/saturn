<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Un Universo Inmersivo para Ti - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }

        /* PANTALLA DE CARGA */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #saturn-logo { width: 45vw; max-width: 180px; margin-bottom: 25px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        #progress-container { width: 75%; max-width: 280px; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; margin-bottom: 25px; }
        #progress-bar { width: 0%; height: 100%; background: #ffcc00; transition: width 0.3s; }

        #btn-start {
            display: none; padding: 18px 40px; background: #ffcc00; color: #000;
            border: none; border-radius: 35px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; font-size: 16px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        #language-toast {
            position: fixed; bottom: 12%; left: 50%; transform: translateX(-50%);
            background: rgba(255, 204, 0, 0.98); color: #000; padding: 15px 25px;
            border-radius: 20px; font-weight: bold; display: none; z-index: 2000;
            text-align: center; min-width: 200px; font-size: 17px;
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <img id="saturn-logo" src="assets/textures/saturn_icon.png" alt="Logo">
        <div id="progress-container"><div id="progress-bar"></div></div>
        <button id="btn-start">Comenzar Experiencia</button>
    </div>

    <div id="language-toast"></div>

    <audio id="backgroundAudio" loop>
        <source src="assets/audio/saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.136.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const loadingManager = new THREE.LoadingManager();
        const progressBar = document.getElementById('progress-bar');
        const btnStart = document.getElementById('btn-start');
        const toast = document.getElementById('language-toast');
        const audio = document.getElementById('backgroundAudio');

        loadingManager.onProgress = (url, loaded, total) => { progressBar.style.width = (loaded / total * 100) + '%'; };
        loadingManager.onLoad = () => { btnStart.style.display = 'block'; document.getElementById('progress-container').style.display = 'none'; };

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader(loadingManager);
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || 'cliente_01';

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);

        // Fondo de estrellas lejanas (Blancas estáticas)
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for (let i = 0; i < 15000; i++) {
            starCoords.push((Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const starPoints = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.1, sizeAttenuation: false }));
        scene.add(starPoints);

        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshStandardMaterial({ 
                map: textureLoader.load('./assets/textures/saturno.jpg'),
                roughness: 0.85,
                metalness: 0.1
            })
        );
        scene.add(saturn);

        const atmosphereGlow = new THREE.Mesh(
            new THREE.SphereGeometry(1.27, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.3, side: THREE.BackSide })
        );
        scene.add(atmosphereGlow);

        const ringGroup = new THREE.Group();
        ringGroup.rotation.x = Math.PI * 0.15;
        scene.add(ringGroup);

        const wordsGroup = new THREE.Group();
        const photoGroup = new THREE.Group();
        ringGroup.add(wordsGroup, photoGroup);

        // Anillos sólidos sutiles
        const ringMat = new THREE.MeshBasicMaterial({ 
            color: 0xffe066, side: THREE.DoubleSide, transparent: true, opacity: 0.3, 
            depthWrite: false, blending: THREE.AdditiveBlending 
        });
        [new THREE.RingGeometry(1.8, 3.2, 64), new THREE.RingGeometry(3.5, 4.8, 64)].forEach(geo => {
            const mesh = new THREE.Mesh(geo, ringMat);
            mesh.rotation.x = Math.PI / 2;
            ringGroup.add(mesh);
        });

        // --- NUEVA ESFERA DE PARTICULAS "DESTELLO" (VOLUMEN) ---
        const destelloTexture = textureLoader.load('./assets/textures/destello.png');
        const nebulaCount = 5000;
        const nebulaGeo = new THREE.BufferGeometry();
        const nebulaPos = [];
        const nebulaScales = [];

        for (let i = 0; i < nebulaCount; i++) {
            // Distribución esférica para envolver el sistema
            const r = 4.5 + Math.random() * 2.5; // Radio que envuelve planetas y anillos
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);

            nebulaPos.push(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.sin(phi) * Math.sin(theta),
                r * Math.cos(phi)
            );
            nebulaScales.push(Math.random());
        }

        nebulaGeo.setAttribute('position', new THREE.Float32BufferAttribute(nebulaPos, 3));
        nebulaGeo.setAttribute('scale', new THREE.Float32BufferAttribute(nebulaScales, 1));

        const nebulaMat = new THREE.PointsMaterial({
            map: destelloTexture,
            size: 0.4,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true,
            color: 0xfff0aa // Tono amarillento suave para los destellos
        });

        const nebulaStars = new THREE.Points(nebulaGeo, nebulaMat);
        scene.add(nebulaStars);

        // --- ARREGLO DE LETRAS EN ESPIRAL ---
        const rawIdiomas = [
            "Español—Te amo", "Inglés—I love you", "Francés—Je t’aime", "Italiano—Ti amo", "Alemán—Ich liebe dich",
            "Portugués—Eu te amo", "Ruso—Я тебя люблю", "Japonés—愛してる", "Coreano—사랑해", "Chino—我爱你",
            "Hindi—प्यार करता हूँ", "Turco—Seni seviyorum", "Griego—Σ' αγαπώ", "Holandés—Ik hou van jou",
            "Sueco—Jag älskar dig", "Polaco—Kocham cię", "Checo—Miluji tě", "Húngaro—Szeretlek", "Rumano—Te iubesc",
            "Finlandés—Rakastan sinua", "Hebreo—אני אוהב אותך", "Filipino—Mahal kita", "Indonesio—Aku cinta kamu",
            "Swahili—Nakupenda", "Ucraniano—Я тебе кохаю", "Catalán—T’estimo", "Euskera—Maite zaitut", "Quechua—Kuyayki",
            "Guaraní—Rohayhu", "Náhuatl—Nimitztlazohtla", "Maya—In k’áatech", "Latín—Te amo", "Esperanto—Mi amas vin",
            "Danés—Jeg elsker dig", "Noruego—Jeg elsker deg", "Eslovaco—Ľúbim ťa", "Serbio—Волим те", "Croata—Volim te",
            "Bosnio—Volim te", "Islandés—Ég elska þig", "Maltés—Inħobbok", "Malayo—Saya cinta padamu", "Zulú—Ngiyakuthanda",
            "Xhosa—Ndiyakuthanda", "Yoruba—Mo nifẹ rẹ", "Amárico—እወድሃለሁ", "Somali—Waan ku jeclahay", "Nepalí—म तिमीलाई माया गर्छु",
            "Punjabi—ਮੈਂ ਤੈਨੂੰ ਪਿਆਰ ਕਰਦਾ ਹਾਂ", "Urdu—میں تم سے پیار کرتا ہوں", "Persa—دوستت دارم", "Kurdo—Ez hej te dikim",
            "Georgiano—მიყვარხარ", "Armenio—Ես սիրում եਮ քեզ", "Azerbaiyano—Mən səni sevirəm", "Letón—Es tevi mīlu", "Estonio—Ma armastan sind",
            "Lituano—Aš tave miyliu", "Bielorruso—Я цябе кахаю", "Gallego—Quérote", "Aymara—Mä munta", "Cebuano—Gihigugma tika",
            "Laos—ຂ້ອຍຮັກເຈົ້າ", "Birmano—မင်းကိုချစ်တယ်", "Jemer—ខ្ញុំស្រឡាញ់អ្នក", "Mongol—Би чамд хайртай", "Tibetano—ངས་ཁྱེད་ལ་བརྩེ་དུང་ཡོད།",
            "Hawaiano—Aloha wau iā ‘oe", "Samoano—Ou te alofa ia te oe", "Maorí—Aroha atu au ki a koe", "Fiyiano—Au domoni iko", "Tonga—‘Ofa atu",
            "Lingala—Nalingi yo", "Hausa—Ina son ka", "Igbo—A hụrụ m gị n’anya", "Malgache—Tiako ianao", "Tártaro—Мин сине яратам",
            "Kazajo—Мен сені жақсы көремін", "Uzbek—Men seni sevaman", "Tayiko—Ман туро дӯст медорам", "Sinhala—මම ඔයාට ආදරෙයි", "Haitiano—Mwen renmen ou",
            "Irlandés—Taim i’ ngra leat", "Luxemburgués—Ech hunn dech gär", "Sánscrito—त्वामहम् स्नेहे", "Arameo—ܐܚܒܟ", "Copto—ⲁⲓⲉ rⲉϩⲟ",
            "Bengalí—আমি তোমায় ভালোবাসি", "Guyaratí—હું તને પ્રેમ કરું છું", "Canarés—ನಾನು ನಿನ್ನನ್ನು prītisuatēne", "Malabar—ഞാൻ ninne snehikkunnu", "Maratí—मी तुझ्यावर प्रेम करतो",
            "Télugu—నేను నిన్ను ప్రేమిస్తున్నాను", "Tamil—நான் உன்னை காதலிக்கிறேன்", "Vietnamita—Tôi yêu bạn", "Tailandés—ฉันรักคุณ", "Albanés—Të dua"
        ];

        const totalLanguages = rawIdiomas.length;
        const spiralCoils = 3.5;
        const startRadiusWord = 1.4;
        const endRadiusWord = 4.9;
        const fixedHeightWord = 0.15; 

        for(let i = 0; i < totalLanguages; i++) {
            const data = rawIdiomas[i].split('—');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            
            ctx.shadowColor = '#ffdb4d';
            ctx.shadowBlur = 10;
            ctx.font = 'bold 44px Georgia';
            ctx.fillStyle = '#ffffff'; 
            ctx.textAlign = 'center'; 
            ctx.fillText(data[1], 256, 75);
            
            ctx.strokeStyle = '#ffdb4d';
            ctx.lineWidth = 1.0;
            ctx.strokeText(data[1], 256, 75);

            const wordSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: new THREE.CanvasTexture(canvas), transparent: true, opacity: 0, depthWrite: false, blending: THREE.AdditiveBlending
            }));
            
            const progress = i / (totalLanguages - 1);
            const angle = progress * Math.PI * 2 * spiralCoils;
            const radius = startRadiusWord + (progress * (endRadiusWord - startRadiusWord));
            
            wordSprite.position.set(Math.cos(angle) * radius, fixedHeightWord, Math.sin(angle) * radius);
            wordSprite.scale.set(0.7, 0.18, 1);
            wordSprite.userData = { idioma: data[0] };
            wordsGroup.add(wordSprite);
        }

        // --- ARREGLO DE FOTOS: MÁS BAJAS (CASI A LA ALTURA DE LAS FRASES) ---
        function cargarSiguienteFoto(index) {
            const photoLimit = 30;
            if (index > photoLimit) return;

            textureLoader.load(`./assets/photos/${user}/foto (${index}).jpg`, (texture) => {
                const aspect = texture.image.width / texture.image.height;
                const photoMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0, depthWrite: false });
                const photoSprite = new THREE.Sprite(photoMat);
                
                photoSprite.scale.set(0.25 * (aspect > 1 ? aspect : 1), 0.25 / (aspect < 1 ? aspect : 1), 1);
                
                const angle = Math.random() * Math.PI * 2;
                const radius = 3.3 + Math.random() * 1.0; 
                // Altura bajada de 0.4 a 0.22 para estar cerca de las letras (0.15)
                photoSprite.position.set(Math.cos(angle) * radius, 0.22, Math.sin(angle) * radius);
                
                photoGroup.add(photoSprite);
                cargarSiguienteFoto(index + 1);
            }, undefined, (err) => {
                console.log(`Carga finalizada.`);
            });
        }
        cargarSiguienteFoto(1);

        // --- INTERACCIÓN ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const handleInteraction = (e) => {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(wordsGroup.children);
            if (hits.length > 0) {
                toast.innerHTML = `Así se dice Te Amo en<br><span style="font-size: 1.1em; color: #333;">${hits[0].object.userData.idioma}</span>`;
                toast.style.display = 'block';
                if(window.toastTimeout) clearTimeout(window.toastTimeout);
                window.toastTimeout = setTimeout(() => toast.style.display = 'none', 3500);
            }
        };

        window.addEventListener('click', handleInteraction);
        window.addEventListener('touchstart', handleInteraction);

        btnStart.addEventListener('click', () => {
            document.getElementById('loader-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader-screen').style.display = 'none';
                audio.play().catch(e => console.error("Error audio:", e));
            }, 500);
        });

        camera.position.set(0, 5, 12);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            const time = Date.now() * 0.001;

            saturn.rotation.y += 0.001;
            ringGroup.rotation.y += 0.0003; 
            starPoints.rotation.y += 0.0001;
            
            // Animación de la nebulosa de destellos
            nebulaStars.rotation.y += 0.0005;
            nebulaStars.rotation.z += 0.0002;
            // Efecto de pulsación en el tamaño de los destellos
            nebulaStars.material.size = 0.35 + Math.sin(time * 2) * 0.05;

            const dist = camera.position.distanceTo(scene.position);
            const targetOpacity = dist < 12 ? 1 : 0; 
            
            wordsGroup.children.forEach(w => w.material.opacity = THREE.MathUtils.lerp(w.material.opacity, targetOpacity, 0.05));
            photoGroup.children.forEach(p => p.material.opacity = THREE.MathUtils.lerp(p.material.opacity, targetOpacity, 0.05));

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
