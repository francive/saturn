<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universo Optimizado - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 0.5s ease;
        }
        #saturn-logo { width: 45vw; max-width: 180px; margin-bottom: 25px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        #progress-container { width: 75%; max-width: 280px; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; margin-bottom: 25px; }
        #progress-bar { width: 0%; height: 100%; background: #ffcc00; transition: width 0.3s; }
        #btn-start {
            display: none; padding: 18px 40px; background: #ffcc00; color: #000;
            border: none; border-radius: 35px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; font-size: 16px;
        }
        #language-toast {
            position: fixed; bottom: 12%; left: 50%; transform: translateX(-50%);
            background: rgba(255, 204, 0, 0.98); color: #000; padding: 15px 25px;
            border-radius: 20px; font-weight: bold; display: none; z-index: 2000;
            text-align: center; min-width: 200px; font-size: 17px;
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <img id="saturn-logo" src="assets/textures/saturn_icon.png" alt="Logo">
        <div id="progress-container"><div id="progress-bar"></div></div>
        <button id="btn-start">Comenzar Experiencia</button>
    </div>

    <div id="language-toast"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.136.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const loadingManager = new THREE.LoadingManager();
        const progressBar = document.getElementById('progress-bar');
        const btnStart = document.getElementById('btn-start');
        const toast = document.getElementById('language-toast');

        loadingManager.onProgress = (url, loaded, total) => { progressBar.style.width = (loaded / total * 100) + '%'; };
        loadingManager.onLoad = () => { btnStart.style.display = 'block'; document.getElementById('progress-container').style.display = 'none'; };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader(loadingManager);
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || 'cliente_01';

        // --- ILUMINACIÓN ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // --- ESTRELLAS CUADRADITAS (OPTIMIZADAS) ---
        const starCount = 25000;
        const starGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 3000;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: false });
        const starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);

        // --- ESFERA DE DESTELLOS (USA TU IMAGEN) ---
        const flareTexture = textureLoader.load('./assets/textures/destello.png');
        const flareCount = 500;
        const flareGeo = new THREE.BufferGeometry();
        const flarePos = new Float32Array(flareCount * 3);
        for (let i = 0; i < flareCount; i++) {
            const r = 15; // Radio de la esfera de destellos
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            flarePos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            flarePos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            flarePos[i*3+2] = r * Math.cos(phi);
        }
        flareGeo.setAttribute('position', new THREE.BufferAttribute(flarePos, 3));
        const flareMat = new THREE.PointsMaterial({ 
            map: flareTexture, size: 15, transparent: true, opacity: 0.4, 
            blending: THREE.AdditiveBlending, depthWrite: false 
        });
        const flareSphere = new THREE.Points(flareGeo, flareMat);
        scene.add(flareSphere);

        // --- PLANETA ---
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 32, 32),
            new THREE.MeshStandardMaterial({ map: textureLoader.load('./assets/textures/saturno.jpg') })
        );
        scene.add(saturn);

        const ringGroup = new THREE.Group();
        ringGroup.rotation.x = Math.PI * 0.15;
        scene.add(ringGroup);

        const wordsGroup = new THREE.Group();
        const photoGroup = new THREE.Group();
        ringGroup.add(wordsGroup, photoGroup);

        // --- FOTOS PEQUEÑAS Y SIN BRILLO ---
        function cargarSiguienteFoto(index) {
            textureLoader.load(`./assets/photos/${user}/foto (${index}).jpg`, (texture) => {
                const photoSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                    map: texture, transparent: true, opacity: 0, depthWrite: false 
                }));
                // Tamaño reducido para que no ocupen toda la pantalla
                photoSprite.scale.set(0.4, 0.4, 1); 
                const angle = Math.random() * Math.PI * 2;
                const radius = 2.5 + Math.random() * 2;
                photoSprite.position.set(Math.cos(angle) * radius, 0.2, Math.sin(angle) * radius);
                photoGroup.add(photoSprite);
                if(index < 20) cargarSiguienteFoto(index + 1); // Limitador de seguridad
            }, undefined, () => console.log("Fotos listas"));
        }
        cargarSiguienteFoto(1);

        // --- IDIOMAS ---
        const rawIdiomas = ["Español—Te amo", "Inglés—I love you", "Francés—Je t’aime", "Italiano—Ti amo", "Japonés—愛してる"];
        rawIdiomas.forEach((item, i) => {
            const data = item.split('—');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.font = 'bold 24px Arial'; ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
            ctx.fillText(data[1], 128, 40);

            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, opacity: 0 }));
            const angle = (i / rawIdiomas.length) * Math.PI * 2;
            sprite.position.set(Math.cos(angle) * 2.2, 0, Math.sin(angle) * 2.2);
            sprite.scale.set(0.6, 0.15, 1);
            sprite.userData = { idioma: data[0] };
            wordsGroup.add(sprite);
        });

        // --- INTERACCIÓN ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const handleInteraction = (e) => {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(wordsGroup.children);
            if (hits.length > 0) {
                toast.innerHTML = `Idioma: ${hits[0].object.userData.idioma}`;
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 3000);
            }
        };

        window.addEventListener('click', handleInteraction);
        btnStart.addEventListener('click', () => {
            document.getElementById('loader-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loader-screen').style.display = 'none', 500);
        });

        camera.position.set(0, 5, 12);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            saturn.rotation.y += 0.002;
            ringGroup.rotation.y += 0.0005;
            flareSphere.rotation.y -= 0.0002;
            
            // Efecto de visibilidad suave
            const dist = camera.position.length();
            const opacity = dist < 20 ? 1 : 0;
            photoGroup.children.forEach(p => p.material.opacity = THREE.MathUtils.lerp(p.material.opacity, opacity, 0.05));
            wordsGroup.children.forEach(w => w.material.opacity = THREE.MathUtils.lerp(w.material.opacity, opacity, 0.05));

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
