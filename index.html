<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo Inmersivo para Ti - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }

        /* PANTALLA DE CARGA */
        #loader-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #saturn-logo {
            width: 120px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #progress-container {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #ffcc00;
            transition: width 0.3s;
        }

        #btn-start {
            display: none;
            padding: 12px 30px;
            background: #ffcc00;
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        #audio-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            color: white;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <img id="saturn-logo" src="assets/textures/saturn_icon.png" alt="Logo">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button id="btn-start">Comenzar Experiencia</button>
    </div>

    <div id="audio-container">
        <label for="volumeRange">Volumen</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="backgroundAudio" loop>
        <source src="assets/audio/saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.136.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        // GESTOR DE CARGA
        const loadingManager = new THREE.LoadingManager();
        const progressBar = document.getElementById('progress-bar');
        const btnStart = document.getElementById('btn-start');
        const progressContainer = document.getElementById('progress-container');

        loadingManager.onProgress = (url, itemsLoaded, itemsTotal) => {
            const progress = (itemsLoaded / itemsTotal) * 100;
            progressBar.style.width = progress + '%';
        };

        loadingManager.onLoad = () => {
            progressContainer.style.display = 'none';
            btnStart.style.display = 'block';
        };

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader(loadingManager);
        textureLoader.setCrossOrigin('anonymous');

        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || 'cliente_01'; 

        // --- 1. LUCES (Standard necesita luces para brillar) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3); // Luz tenue para sombras
        scene.add(ambientLight);

        const sideLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sideLight.position.set(5, 3, 5); // Luz lateral para realismo
        scene.add(sideLight);

        // --- 2. RENDERIZADOR (Antialias Activado) ---
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 3. FONDO DE ESTRELLAS DINÁMICO (BufferGeometry) ---
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for (let i = 0; i < 10000; i++) {
            const x = (Math.random() - 0.5) * 2000;
            const y = (Math.random() - 0.5) * 2000;
            const z = (Math.random() - 0.5) * 2000;
            starCoords.push(x, y, z);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true });
        const starPoints = new THREE.Points(starGeo, starMat);
        scene.add(starPoints);

        // --- 4. SATURNO (MeshStandardMaterial) ---
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshStandardMaterial({ 
                map: textureLoader.load('./assets/textures/saturno.jpg'),
                roughness: 0.8,
                metalness: 0.1
            })
        );
        scene.add(saturn);

        // --- 5. ATMÓSFERA (Glow) ---
        const atmosphereGeo = new THREE.SphereGeometry(1.25, 64, 64);
        const atmosphereMat = new THREE.MeshBasicMaterial({
            color: 0xfffae6,
            transparent: true,
            opacity: 0.15,
            side: THREE.BackSide
        });
        const atmosphereGlow = new THREE.Mesh(atmosphereGeo, atmosphereMat);
        scene.add(atmosphereGlow);

        const ringGroup = new THREE.Group();        
        const ringStars = new THREE.Group();        
        const wordsGroup = new THREE.Group();      
        const photoGroup = new THREE.Group(); 
        
        ringGroup.rotation.x = Math.PI * 0.15;
        scene.add(ringGroup);
        ringGroup.add(ringStars, wordsGroup, photoGroup);

        // --- 6. ANILLOS REALISTAS (AlphaMap) ---
        const ringAlpha = textureLoader.load('./assets/textures/anillos_alpha.png'); // Si no tienes este archivo, puedes usar los mismos anillos con side: DoubleSide
        const ringMat = new THREE.MeshStandardMaterial({ 
            color: 0xffe066, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.7,
            alphaMap: ringAlpha, // Crea huecos realistas
            roughness: 0.5
        });

        const rings = [new THREE.RingGeometry(1.8, 3.2, 64), new THREE.RingGeometry(3.5, 4.8, 64)];
        rings.forEach(geo => {
            const mesh = new THREE.Mesh(geo, ringMat);
            mesh.rotation.x = Math.PI / 2;
            ringGroup.add(mesh);
        });

        // (Resto del código de frases y fotos se mantiene igual por su funcionalidad)
        const destelloTexture = textureLoader.load('./assets/textures/destello.png');
        for (let i = 0; i < 1000; i++) {
            const starMatRing = new THREE.SpriteMaterial({ 
                map: destelloTexture, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.8 
            });
            const star = new THREE.Sprite(starMatRing);
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.8 + Math.random() * 3.5; 
            star.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 0.1, Math.sin(angle) * radius);
            const s = Math.random() * 0.25 + 0.1;
            star.scale.set(s, s, 1);
            ringStars.add(star);
        }

        const loveWords = ["Te amo", "✨ Eres muy especial ✨", "Flores amarillas", "Nuestro Amor", "Te adoro", "Siempre brillas", "Flores para ti", "Infinito"];
        for(let i = 0; i < 100; i++) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.font = '32px Georgia'; ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center'; ctx.fillText(loveWords[i % loveWords.length], 128, 40);
            const wordSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: new THREE.CanvasTexture(canvas), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0
            }));
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.random() * 3.0; 
            wordSprite.position.set(Math.cos(angle) * radius, 0.15, Math.sin(angle) * radius);
            wordSprite.scale.set(0.5, 0.12, 1); 
            wordSprite.visible = false; 
            wordsGroup.add(wordSprite);
        }

        function cargarSiguienteFoto(index) {
            const ruta = `./assets/photos/${user}/foto (${index}).jpg`;
            textureLoader.load(
                ruta, 
                (texture) => {
                    const aspect = texture.image.width / texture.image.height;
                    const photoMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0 });
                    const photoSprite = new THREE.Sprite(photoMat);
                    if (aspect > 1) photoSprite.scale.set(0.6 * aspect, 0.6, 1); 
                    else photoSprite.scale.set(0.5, 0.5 / aspect, 1);
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 2.0 + Math.random() * 2.8; 
                    photoSprite.position.set(Math.cos(angle) * radius, 0.3, Math.sin(angle) * radius);
                    photoSprite.visible = false;
                    photoGroup.add(photoSprite);
                    cargarSiguienteFoto(index + 1);
                },
                undefined,
                (err) => { console.log(`Fotos de ${user} listas.`); }
            );
        }
        cargarSiguienteFoto(1);

        const audio = document.getElementById('backgroundAudio');
        btnStart.addEventListener('click', () => {
            document.getElementById('loader-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader-screen').style.display = 'none';
                audio.play();
            }, 500);
        });

        document.getElementById('volumeRange').addEventListener('input', (e) => { audio.volume = e.target.value; });

        camera.position.set(0, 5, 15);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            saturn.rotation.y += 0.001;
            ringGroup.rotation.y += 0.0005; 
            
            // Parpadeo de estrellas de fondo
            starPoints.rotation.y += 0.0002;
            starMat.opacity = 0.7 + Math.sin(Date.now() * 0.001) * 0.3;

            const dist = camera.position.distanceTo(scene.position);
            const isNear = dist < 9; 
            const opacity = isNear ? 1 : 0; 
            
            wordsGroup.children.forEach(w => {
                w.material.opacity = opacity;
                w.visible = isNear;
            });
            photoGroup.children.forEach(p => {
                p.material.opacity = opacity;
                p.visible = isNear;
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
