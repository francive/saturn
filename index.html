<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo Inmersivo para Ti - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #audio-container {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1); padding: 10px;
            border-radius: 8px; backdrop-filter: blur(5px);
            color: white; z-index: 100; display: flex;
            align-items: center; gap: 10px; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        input[type=range] { cursor: pointer; }
    </style>
</head>
<body>

    <div id="audio-container">
        <label for="volumeRange">Volumen</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="backgroundAudio" loop>
        <source src="saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();

        const audio = document.getElementById('backgroundAudio');
        const volumeSlider = document.getElementById('volumeRange');
        window.addEventListener('click', () => { audio.play(); }, { once: true });
        volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });

        // 1. FONDO
        const bgTexture = textureLoader.load('estrellas.jpg'); 
        const bgPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 120),
            new THREE.MeshBasicMaterial({ map: bgTexture, transparent: true, depthWrite: false })
        );
        scene.add(bgPlane);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. SATURNO
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshBasicMaterial({ map: textureLoader.load('saturno.jpg') })
        );
        scene.add(saturn);

        // 3. ANILLOS E INCLINACIÓN (25 GRADOS)
        const ROTACION_X = Math.PI * 0.14; // Los 25 grados exactos

        // ANILLO SÓLIDO AMARILLO
        const solidRing = new THREE.Mesh(
            new THREE.RingGeometry(2.2, 4.0, 128),
            new THREE.ShaderMaterial({
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `varying vec2 vUv; void main() { float intensity = smoothstep(0.0, 1.0, vUv.y); gl_FragColor = vec4(1.0, 0.85, 0.3, 1.0) * intensity; }`,
                transparent: true, depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending 
            })
        );
        solidRing.rotation.x = ROTACION_X;
        scene.add(solidRing);

        // GRUPO DE PARTÍCULAS
        const starsGroup = new THREE.Group();
        starsGroup.rotation.x = ROTACION_X; // Mismo ángulo que el anillo
        scene.add(starsGroup);

        const starMat = new THREE.SpriteMaterial({ 
            map: textureLoader.load('destello.png'), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.8 
        });

        for (let i = 0; i < 4000; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.pow(Math.random(), 0.5) * 3.8; 
            const star = new THREE.Sprite(starMat.clone());
            const s = Math.random() * 0.08 + 0.02; 
            star.scale.set(s, s, 1);
            star.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 0.05, Math.sin(angle) * radius);
            starsGroup.add(star);
        }

        // GRUPO DE PALABRAS
        const wordsGroup = new THREE.Group();
        wordsGroup.rotation.x = ROTACION_X;
        scene.add(wordsGroup);

        const loveWords = ["Te amo", "✨ Eres muy especial ✨", "Flores amarillas", "Nuestro Amor", "Te adoro", "Siempre brillas", "Flores para ti", "Infinito", "Destino", "Te adoro", "Gracia", "Cielo"];
        for(let i = 0; i < 400; i++) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 128; canvas.height = 32;
            ctx.font = '28px Georgia'; ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center'; ctx.fillText(loveWords[i % loveWords.length], 64, 28);
            const word = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.2 + Math.pow(Math.random(), 0.5) * 3.8; 
            word.position.set(Math.cos(angle) * radius, 0.1, Math.sin(angle) * radius);
            word.scale.set(0.1, 0.025, 1); 
            word.material.opacity = 0;
            wordsGroup.add(word);
        }

        camera.position.set(0, 3, 10);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            saturn.rotation.y += 0.001;
            
            // CORRECCIÓN CLAVE: Girar en Z para que el movimiento sea izquierda-derecha sobre el plano inclinado
            solidRing.rotation.z -= 0.0003;
            starsGroup.rotation.z -= 0.0003;
            wordsGroup.rotation.z -= 0.0003;

            // Seguimiento de fondo
            const vector = new THREE.Vector3(0, 0, -50).applyQuaternion(camera.quaternion);
            bgPlane.position.copy(camera.position).add(vector);
            bgPlane.quaternion.copy(camera.quaternion);

            const dist = camera.position.distanceTo(scene.position);
            wordsGroup.children.forEach(w => w.material.opacity = dist < 7.5 ? 1 : 0);
            solidRing.material.opacity = dist < 7.5 ? 0.5 : 1;

            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
