<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo Inmersivo para Ti - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #audio-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            color: white;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="audio-container">
        <label for="volumeRange">Volumen</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="backgroundAudio" loop>
        <source src="assets/audio/saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const urlParams = new URLSearchParams(window.location.search);
        const cliente = urlParams.get('user') || 'cliente_01'; 

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();

        const audio = document.getElementById('backgroundAudio');
        const volumeSlider = document.getElementById('volumeRange');
        window.addEventListener('click', () => { audio.play(); }, { once: true });
        volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });

        // 1. FONDO
        const bgTexture = textureLoader.load('assets/textures/estrellas.jpg'); 
        const bgMaterial = new THREE.MeshBasicMaterial({ map: bgTexture, side: THREE.BackSide });
        const backgroundSphere = new THREE.Mesh(new THREE.SphereGeometry(500, 32, 32), bgMaterial);
        scene.add(backgroundSphere);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 2. SATURNO
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshBasicMaterial({ map: textureLoader.load('assets/textures/saturno.jpg') })
        );
        scene.add(saturn);

        // 3. GRUPOS E INCLINACIÓN (Toda la órbita se inclina 15 grados)
        const mainOrbitGroup = new THREE.Group();
        mainOrbitGroup.rotation.x = Math.PI * 0.15; 
        scene.add(mainOrbitGroup);

        const atmosphereStars = new THREE.Group(); 
        scene.add(atmosphereStars); // Las estrellas del fondo no se inclinan

        // --- ANILLO SÓLIDO (Dorado) ---
        const ringGeo = new THREE.RingGeometry(2.2, 5, 64);
        const ringMat = new THREE.MeshBasicMaterial({ 
            color: 0xffcc33, 
            transparent: true, 
            opacity: 0.4, 
            side: THREE.DoubleSide 
        });
        const ringMesh = new THREE.Mesh(ringGeo, ringMat);
        ringMesh.rotation.x = Math.PI / 2;
        mainOrbitGroup.add(ringMesh);

        // --- ESTRELLAS DE LOS ANILLOS ---
        const destelloTexture = textureLoader.load('assets/textures/destello.png');
        for (let i = 0; i < 1000; i++) {
            const starMat = new THREE.SpriteMaterial({ map: destelloTexture, transparent: true, blending: THREE.AdditiveBlending, opacity: Math.random() });
            const star = new THREE.Sprite(starMat);
            const r = 2.2 + Math.random() * 2.8;
            const theta = Math.random() * Math.PI * 2;
            star.position.set(Math.cos(theta) * r, (Math.random() - 0.5) * 0.1, Math.sin(theta) * r);
            const s = Math.random() * 0.05 + 0.02;
            star.scale.set(s, s, 1);
            mainOrbitGroup.add(star);
        }

        // --- CARGA DE FOTOS (Como Planos Inclinados) ---
        const photoGroup = new THREE.Group();
        mainOrbitGroup.add(photoGroup);

        for (let i = 1; i <= 20; i++) { // Ajustado a 20 para no saturar, puedes subirlo a 40
            const photoTexture = textureLoader.load(`assets/photos/${cliente}/foto (${i}).jpg`);
            const photoMat = new THREE.MeshBasicMaterial({ 
                map: photoTexture, 
                transparent: true, 
                side: THREE.DoubleSide,
                opacity: 0.9
            });
            const photo = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.4), photoMat);
            
            const angle = Math.random() * Math.PI * 2;
            const radius = 3.0 + Math.random() * 2.0;
            photo.position.set(Math.cos(angle) * radius, 0.05, Math.sin(angle) * radius);
            photo.rotation.x = -Math.PI / 2; // Acostada sobre el anillo
            photo.rotation.z = Math.random() * Math.PI; // Rotación aleatoria para que se vea natural
            photoGroup.add(photo);
        }

        // --- PALABRAS ---
        const loveWords = ["Te amo", "✨ Eres especial ✨", "Nuestra Historia", "Te adoro", "Siempre brillas", "Juntos", "Infinito"];
        const wordsGroup = new THREE.Group();
        mainOrbitGroup.add(wordsGroup);

        for(let i = 0; i < 40; i++) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.font = '32px Georgia'; ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center'; ctx.fillText(loveWords[i % loveWords.length], 128, 40);

            const wordMat = new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, side: THREE.DoubleSide });
            const word = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.15), wordMat);

            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.random() * 2.5; 
            word.position.set(Math.cos(angle) * radius, 0.02, Math.sin(angle) * radius);
            word.rotation.x = -Math.PI / 2;
            wordsGroup.add(word);
        }

        camera.position.set(0, 8, 12);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            saturn.rotation.y += 0.002;
            mainOrbitGroup.rotation.y += 0.001; // Todo el sistema de anillos y fotos gira junto

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
