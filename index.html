<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo Inmersivo - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #audio-container {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1); padding: 10px;
            border-radius: 8px; backdrop-filter: blur(5px);
            color: white; z-index: 100; display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="audio-container">
        <label>Volumen</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="backgroundAudio" loop>
        <source src="assets/audio/saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || 'cliente_01'; 

        // --- LUCES ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. SATURNO (Material básico para que NO se vea negro nunca)
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshBasicMaterial({ map: textureLoader.load('assets/textures/saturno.jpg') })
        );
        scene.add(saturn);

        // 2. GRUPOS
        const atmosphereStars = new THREE.Group(); 
        const ringGroup = new THREE.Group();        
        const wordsGroup = new THREE.Group();      
        const photoGroup = new THREE.Group(); 
        
        ringGroup.rotation.x = Math.PI * 0.15;
        scene.add(atmosphereStars, ringGroup);
        ringGroup.add(wordsGroup, photoGroup);

        const destelloTex = textureLoader.load('assets/textures/destello.png');

        // --- ESTRELLAS DEL FONDO (DOMO) ---
        for (let i = 0; i < 2000; i++) {
            const starMat = new THREE.SpriteMaterial({ map: destelloTex, transparent: true, opacity: Math.random() });
            const star = new THREE.Sprite(starMat);
            const r = 15 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            star.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
            star.scale.set(0.2, 0.2, 1);
            atmosphereStars.add(star);
        }

        // --- ANILLOS VISUALES ---
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffe066, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
        const ringGeo = new THREE.RingGeometry(1.8, 4.8, 64);
        const ringMesh = new THREE.Mesh(ringGeo, ringMat);
        ringMesh.rotation.x = Math.PI / 2;
        ringGroup.add(ringMesh);

        // --- ESTRELLAS DEL ANILLO (MÁS NOTORIAS) ---
        for (let i = 0; i < 3000; i++) {
            const sMat = new THREE.SpriteMaterial({ map: destelloTex, transparent: true, blending: THREE.AdditiveBlending });
            const s = new THREE.Sprite(sMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.8 + Math.random() * 3.0; 
            s.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 0.1, Math.sin(angle) * radius);
            s.scale.set(0.06, 0.06, 1);
            ringGroup.add(s);
        }

        // --- FRASES ---
        const loveWords = ["Te amo", "✨ Eres especial ✨", "Flores amarillas", "Nuestro Amor", "Te adoro", "Siempre brillas"];
        for(let i = 0; i < 40; i++) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.font = '30px Georgia'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
            ctx.fillText(loveWords[i % loveWords.length], 128, 40);

            const word = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, opacity: 0 }));
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.random() * 2.5;
            word.position.set(Math.cos(angle) * radius, 0.2, Math.sin(angle) * radius);
            word.scale.set(0.6, 0.15, 1);
            wordsGroup.add(word);
        }

        // --- FOTOS (EN LOS ANILLOS) ---
        for (let i = 1; i <= 40; i++) {
            const pTex = textureLoader.load(`assets/photos/${user}/foto (${i}).jpg`);
            const pMat = new THREE.SpriteMaterial({ map: pTex, transparent: true, opacity: 0 });
            const photo = new THREE.Sprite(pMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.random() * 2.5; 
            photo.position.set(Math.cos(angle) * radius, 0.4, Math.sin(angle) * radius);
            photo.scale.set(0.5, 0.5, 1);
            photoGroup.add(photo);
        }

        // --- AUDIO ---
        const audio = document.getElementById('backgroundAudio');
        window.addEventListener('click', () => { audio.play(); }, { once: true });
        document.getElementById('volumeRange').addEventListener('input', (e) => { audio.volume = e.target.value; });

        camera.position.set(0, 6, 15);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            saturn.rotation.y += 0.001;
            ringGroup.rotation.y += 0.0005;
            atmosphereStars.rotation.y += 0.0001;

            const dist = camera.position.distanceTo(scene.position);
            const show = dist < 10 ? 1 : 0;
            wordsGroup.children.forEach(w => w.material.opacity = show);
            photoGroup.children.forEach(p => p.material.opacity = show);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
