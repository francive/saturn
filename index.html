<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const textureLoader = new THREE.TextureLoader();

    // 1. FONDO DE ESTRELLAS (Corregido para que no se vea gigante)
    const skyGeom = new THREE.SphereGeometry(150, 32, 32);
    const skyTexture = textureLoader.load('estrellas.jpg', (tex) => {
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(6, 6); // Más repeticiones = estrellas más pequeñas y nítidas
    });
    const skyMat = new THREE.MeshBasicMaterial({ map: skyTexture, side: THREE.BackSide });
    scene.add(new THREE.Mesh(skyGeom, skyMat));

    // 2. SATURNO
    const saturn = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshBasicMaterial({ map: textureLoader.load('saturno.jpg') })
    );
    scene.add(saturn);

    // 3. BRILLO (GLOW) - ¡Aquí está el truco para quitar el fondo!
    const glowTexture = textureLoader.load('destello.png');
    const glowMat = new THREE.SpriteMaterial({ 
        map: glowTexture, 
        color: 0xffeebb, 
        transparent: true, 
        opacity: 0.8,
        blending: THREE.AdditiveBlending, // Esto suma colores y elimina el negro
        depthWrite: false // Evita que el cuadro del brillo tape otras cosas
    });
    const glowSprite = new THREE.Sprite(glowMat);
    glowSprite.scale.set(3.5, 3.5, 1);
    scene.add(glowSprite);

    // 4. ANILLO DE ESTRELLAS Y PALABRAS
    const starsGroup = new THREE.Group();
    const wordsGroup = new THREE.Group();
    scene.add(starsGroup, wordsGroup);

    const starMat = new THREE.SpriteMaterial({ 
        map: glowTexture, 
        transparent: true, 
        blending: THREE.AdditiveBlending,
        depthWrite: false 
    });

    for (let i = 0; i < 600; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 1.6 + Math.random() * 2.2;
        const star = new THREE.Sprite(starMat);
        const s = 0.02 + Math.random() * 0.03;
        star.scale.set(s, s, 1);
        star.position.set(Math.cos(angle) * radius, (Math.random()-0.5)*0.2, Math.sin(angle) * radius);
        starsGroup.add(star);
    }

    const baseWords = ["Amor", "Te amo", "Camila", "Juntos", "Siempre", "Eterno", "Bonita", "Mi Vida", "17-05-22", "✨"];
    for(let i = 0; i < 150; i++) {
        const text = baseWords[i % baseWords.length];
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        ctx.font = 'Bold 45px Arial';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.fillText(text, 128, 45);

        const wordSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
            map: new THREE.CanvasTexture(canvas), 
            transparent: true 
        }));
        const angle = (i / 150) * Math.PI * 2;
        const radius = 1.7 + Math.random() * 2.0;
        wordSprite.position.set(Math.cos(angle) * radius, (Math.random()-0.5)*0.15, Math.sin(angle) * radius);
        wordSprite.scale.set(0.4, 0.12, 1);
        wordSprite.material.opacity = 0;
        wordsGroup.add(wordSprite);
    }

    camera.position.z = 6;
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        saturn.rotation.y += 0.002;
        starsGroup.rotation.y += 0.0005;
        wordsGroup.rotation.y += 0.0005;

        const dist = camera.position.distanceTo(scene.position);
        
        // Transición MUCHO más suave basada en la distancia
        if (dist < 4.2) {
            starsGroup.children.forEach(s => s.material.opacity = 0);
            wordsGroup.children.forEach(w => w.material.opacity = 1);
        } else {
            starsGroup.children.forEach(s => s.material.opacity = 1);
            wordsGroup.children.forEach(w => w.material.opacity = 0);
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
