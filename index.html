<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo Inmersivo para Ti - Francis Designs</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }

        /* PANTALLA DE CARGA */
        #loader-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #saturn-logo {
            width: 120px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #progress-container {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #ffcc00;
            transition: width 0.3s;
        }

        #btn-start {
            display: none;
            padding: 12px 30px;
            background: #ffcc00;
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        #audio-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            color: white;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* MENSAJE DE IDIOMA */
        #language-toast {
            position: fixed;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 204, 0, 0.9);
            color: #000;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            display: none;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <img id="saturn-logo" src="assets/textures/saturn_icon.png" alt="Logo">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button id="btn-start">Comenzar Experiencia</button>
    </div>

    <div id="language-toast"></div>

    <div id="audio-container">
        <label for="volumeRange">Volumen</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="backgroundAudio" loop>
        <source src="assets/audio/saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.136.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const loadingManager = new THREE.LoadingManager();
        const progressBar = document.getElementById('progress-bar');
        const btnStart = document.getElementById('btn-start');
        const progressContainer = document.getElementById('progress-container');
        const toast = document.getElementById('language-toast');

        loadingManager.onLoad = () => {
            progressContainer.style.display = 'none';
            btnStart.style.display = 'block';
        };

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader(loadingManager);
        textureLoader.setCrossOrigin('anonymous');

        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || 'cliente_01'; 

        // --- 1. CONFIGURACIÓN ---
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 2. OBJETOS BASE ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sideLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sideLight.position.set(5, 3, 5);
        scene.add(sideLight);

        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshStandardMaterial({ 
                map: textureLoader.load('./assets/textures/saturno.jpg'),
                roughness: 1
            })
        );
        scene.add(saturn);

        const atmosphereGlow = new THREE.Mesh(
            new THREE.SphereGeometry(1.27, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.35, side: THREE.BackSide })
        );
        scene.add(atmosphereGlow);

        const ringGroup = new THREE.Group();
        const wordsGroup = new THREE.Group();
        const photoGroup = new THREE.Group();
        ringGroup.rotation.x = Math.PI * 0.15;
        scene.add(ringGroup);
        ringGroup.add(wordsGroup, photoGroup);

        // --- 3. DATOS DE IDIOMAS (100) ---
        const idiomasAmor = [
            { L: "Español", T: "Te amo" }, { L: "Inglés", T: "I love you" }, { L: "Francés", T: "Je t’aime" },
            { L: "Italiano", T: "Ti amo" }, { L: "Alemán", T: "Ich liebe dich" }, { L: "Portugués", T: "Eu te amo" },
            { L: "Ruso", T: "Я тебя люблю" }, { L: "Japonés", T: "愛してる" }, { L: "Coreano", T: "사랑해" },
            { L: "Chino mandarín", T: "我爱你" }, { L: "Árabe", T: "أحبك" }, { L: "Hindi", T: "मैं तुमसे प्यार करता हूँ" },
            { L: "Turco", T: "Seni seviyorum" }, { L: "Griego", T: "Σ' αγαπώ" }, { L: "Holandés", T: "Ik hou van jou" },
            { L: "Sueco", T: "Jag älskar dig" }, { L: "Polaco", T: "Kocham cię" }, { L: "Hebreo", T: "אני אוהב אותך" },
            { L: "Filipino", T: "Mahal kita" }, { L: "Swahili", T: "Nakupenda" }, { L: "Ucraniano", T: "Я тебе кохаю" },
            { L: "Catalán", T: "T’estimo" }, { L: "Euskera", T: "Maite zaitut" }, { L: "Quechua", T: "Kuyayki" },
            { L: "Guaraní", T: "Rohayhu" }, { L: "Náhuatl", T: "Nimitztlazohtla" }, { L: "Maya", T: "In k’áatech" },
            { L: "Hawaiano", T: "Aloha wau iā ‘oe" }, { L: "Samoano", T: "Ou te alofa ia te oe" },
            { L: "Maorí", T: "Aroha atu au ki a koe" }, { L: "Esperanto", T: "Mi amas vin" },
            { L: "Latín", T: "Te amo" }, { L: "Sánscrito", T: "त्वामहम् स्नेहे" }, { L: "Finlandés", T: "Rakastan sinua" },
            { L: "Islandés", T: "Ég elska þig" }, { L: "Bengalí", T: "আমি তোমায় ভালোবাসি" },
            { L: "Vietnamita", T: "Anh yêu em" }, { L: "Tailandés", T: "ฉันรักคุณ" }, { L: "Persa", T: "دوستت دارم" }
            // Se pueden expandir hasta completar los 100 siguiendo este formato
        ];

        // Crear Sprites de texto
        idiomasAmor.forEach((item, i) => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.font = 'bold 44px "Arial Unicode MS", "Segoe UI Symbol", sans-serif';
            ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
            ctx.fillText(item.T, 256, 80);

            const wordSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: new THREE.CanvasTexture(canvas), 
                transparent: true, 
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                opacity: 0 
            }));

            const angle = (i / idiomasAmor.length) * Math.PI * 2;
            const radius = 2.0 + Math.random() * 2.8;
            wordSprite.position.set(Math.cos(angle) * radius, (Math.random()-0.5)*0.4, Math.sin(angle) * radius);
            wordSprite.scale.set(0.8, 0.2, 1);
            wordSprite.userData = { idioma: item.L };
            wordsGroup.add(wordSprite);
        });

        // --- 4. INTERACTIVIDAD (TAP/CLICK) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function checkClick(event) {
            const x = event.touches ? event.touches[0].clientX : event.clientX;
            const y = event.touches ? event.touches[0].clientY : event.clientY;
            
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(wordsGroup.children);

            if (intersects.length > 0) {
                const selected = intersects[0].object;
                toast.innerText = `Así se dice "Te amo" en ${selected.userData.idioma}`;
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            }
        }

        window.addEventListener('mousedown', checkClick);
        window.addEventListener('touchstart', checkClick);

        // --- 5. ANIMACIÓN Y RENDER ---
        camera.position.set(0, 5, 15);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            saturn.rotation.y += 0.001;
            ringGroup.rotation.y += 0.0005;

            const dist = camera.position.distanceTo(scene.position);
            const isNear = dist < 10;
            const targetOpacity = isNear ? 1 : 0;

            wordsGroup.children.forEach(w => {
                w.material.opacity = THREE.MathUtils.lerp(w.material.opacity, targetOpacity, 0.05);
                w.visible = w.material.opacity > 0.01;
            });

            renderer.render(scene, camera);
        }
        animate();

        // Botón de Inicio
        const audio = document.getElementById('backgroundAudio');
        btnStart.addEventListener('click', () => {
            document.getElementById('loader-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader-screen').style.display = 'none';
                audio.play();
            }, 500);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
