<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo Infinito</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();

        // 1. FONDO ULTRA-LEJANO
        const bgTexture = textureLoader.load('estrellas.jpg');
        bgTexture.wrapS = bgTexture.wrapT = THREE.RepeatWrapping;
        bgTexture.repeat.set(2, 2);
        const bgGeometry = new THREE.PlaneGeometry(1000, 600);
        const bgMaterial = new THREE.MeshBasicMaterial({ 
            map: bgTexture, 
            transparent: true, 
            opacity: 0.9,
            depthWrite: false
        });
        const backgroundPlane = new THREE.Mesh(bgGeometry, bgMaterial);
        scene.add(backgroundPlane);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. SATURNO Y SU BRILLO PROPIO
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshBasicMaterial({ map: textureLoader.load('saturno.jpg') })
        );
        scene.add(saturn);

        const atmosGlow = new THREE.Mesh(
            new THREE.SphereGeometry(1.35, 64, 64),
            new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize( normalMatrix * normal );
                        gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow( 0.6 - dot( vNormal, vec3( 0.0, 0.0, 1.0 ) ), 4.0 );
                        gl_FragColor = vec4( 1.0, 0.9, 0.7, 1.0 ) * intensity;
                    }
                `,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                transparent: true
            })
        );
        scene.add(atmosGlow);

        // 3. ANILLO DENSO (Partículas de Brillo)
        const ringGroup = new THREE.Group();
        const starsGroup = new THREE.Group();
        const wordsGroup = new THREE.Group();
        ringGroup.rotation.x = Math.PI * 0.15;
        scene.add(ringGroup);
        ringGroup.add(starsGroup, wordsGroup);

        const starMat = new THREE.SpriteMaterial({ 
            map: textureLoader.load('destello.png'), 
            transparent: true, 
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            opacity: 0.8
        });

        for (let i = 0; i < 4000; i++) { // Más cantidad para densidad
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.pow(Math.random(), 0.5) * 3.5; 
            const star = new THREE.Sprite(starMat.clone());
            const yPos = (Math.random() - 0.5) * 0.18;
            const s = Math.random() * 0.08 + 0.03; 
            star.scale.set(s, s, 1);
            star.position.set(Math.cos(angle) * radius, yPos, Math.sin(angle) * radius);
            starsGroup.add(star);
        }

        // 4. PALABRAS
        const loveWords = ["Infinito", "Destino", "Magia", "Luz", "Cielo", "Vida", "Tesoro", "Esencia", "Eternidad", "Suspiro", "Latido", "Universo", "Alma", "Poesía", "Sueño", "Dulzura", "Pasión", "Ternura", "Compromiso", "Refugio", "Paz", "Felicidad", "Amanecer", "Estrella", "Milagro", "Gracia", "Encanto", "Adoración", "Lealtad", "Sinceridad", "Abrazo", "Beso", "Calma", "Fuego", "Unión", "Raíz", "Brillo", "Anhelo", "Valentía", "Cuidado", "Respeto", "Incondicional", "Mundo"];

        for(let i = 0; i < 400; i++) {
            const randomText = loveWords[Math.floor(Math.random() * loveWords.length)];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            
            ctx.shadowColor = "white";
            ctx.shadowBlur = 8;
            ctx.font = 'Bold 38px Georgia';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.fillText(randomText, 128, 45);

            const wordSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: new THREE.CanvasTexture(canvas), 
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            }));

            const angle = Math.random() * Math.PI * 2;
            const radius = 2.6 + Math.random() * 2.8;
            wordSprite.position.set(Math.cos(angle) * radius, (Math.random()-0.5) * 0.1, Math.sin(angle) * radius);
            wordSprite.scale.set(0.2, 0.06, 1); 
            wordSprite.material.opacity = 0;
            wordsGroup.add(wordSprite);
        }

        camera.position.set(0, 3, 10);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxDistance = 50; // Para no perder de vista el sistema

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            saturn.rotation.y += 0.001;
            ringGroup.rotation.y += 0.0003;

            // EL FONDO SIGUE A LA CÁMARA (MUY LEJOS)
            const vector = new THREE.Vector3(0, 0, -400); 
            vector.applyQuaternion(camera.quaternion);
            backgroundPlane.position.copy(camera.position).add(vector);
            backgroundPlane.quaternion.copy(camera.quaternion);

            const dist = camera.position.distanceTo(scene.position);
            if (dist < 7.5) {
                starsGroup.children.forEach(s => s.material.opacity = 0.3);
                wordsGroup.children.forEach(w => w.material.opacity = 1);
            } else {
                starsGroup.children.forEach(s => s.material.opacity = 1);
                wordsGroup.children.forEach(w => w.material.opacity = 0);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
