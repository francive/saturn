<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo para Ti</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        // 1. MEJORA DE FONDO: Fondo negro puro y Niebla para dar profundidad
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.051);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader();

        // 2. SATURNO
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.MeshBasicMaterial({ map: textureLoader.load('saturno.jpg') })
        );
        scene.add(saturn);

        // 3. EFECTO GLOW (Aura del planeta)
        const glowMesh = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64), 
            new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize( normalMatrix * normal );
                        gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow( 0.7 - dot( vNormal, vec3( 0.0, 0.0, 1.0 ) ), 4.0 ); 
                        gl_FragColor = vec4( 1.0, 0.9, 0.7, 1.0 ) * intensity;
                    }
                `,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                transparent: true
            })
        );
        scene.add(glowMesh);

        // 4. ESTRUCTURA DEL ANILLO
        const ringGroup = new THREE.Group();
        const starsGroup = new THREE.Group();
        const wordsGroup = new THREE.Group();

        // Inclinación cinemática
        ringGroup.rotation.x = Math.PI * 0.15; 
        ringGroup.rotation.z = Math.PI * 0.03;

        // --- NOVEDAD: DISCO BASE (Para marcar el anillo) ---
        // Esto crea una superficie sutil que hace que el anillo se vea "sólido"
        const ringBase = new THREE.Mesh(
            new THREE.RingGeometry(1.8, 4.5, 128),
            new THREE.MeshBasicMaterial({
                color: 0x221105, // Marrón/Dorado muy oscuro
                transparent: true,
                opacity: 0.15,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            })
        );
        ringBase.rotation.x = Math.PI / 2;
        ringGroup.add(ringBase);
        ringGroup.add(starsGroup, wordsGroup);
        scene.add(ringGroup);

        const starMat = new THREE.SpriteMaterial({ 
            map: textureLoader.load('destello.png'), 
            transparent: true, 
            blending: THREE.AdditiveBlending,
            depthWrite: false 
        });

        // 5. ESTRELLAS DEL ANILLO (Más cantidad para mayor densidad)
        for (let i = 0; i < 1200; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.8 + Math.random() * 2.8; 
            const star = new THREE.Sprite(starMat);
            const s = Math.random() * 0.1 + 0.03; 
            star.scale.set(s, s, 1);
            star.position.set(Math.cos(angle) * radius, (Math.random()-0.5)*0.1, Math.sin(angle) * radius);
            
            // Color variado sutilmente
            star.material.color.setHSL(0.1, 0.3, 0.7 + Math.random() * 0.3);
            starsGroup.add(star);
        }

        // 6. PALABRAS (Con efecto de sombra para resaltar)
        const baseWords = ["Amor", "Te amo", "Camila", "Juntos", "Siempre", "Eterno", "Bonita", "Mi Vida", "17-05-22", "✨"];
        for(let i = 0; i < 450; i++) {
            const text = baseWords[i % baseWords.length];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            
            // Sombra para que la letra resalte sobre el brillo
            ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
            ctx.shadowBlur = 4;
            ctx.font = 'Bold 42px Arial';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.fillText(text, 128, 45);

            const wordSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: new THREE.CanvasTexture(canvas), 
                transparent: true,
                blending: THREE.AdditiveBlending
            }));

            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.random() * 2.4;
            wordSprite.position.set(Math.cos(angle) * radius, (Math.random()-0.5)*0.08, Math.sin(angle) * radius);
            wordSprite.scale.set(0.15, 0.045, 1); 
            wordSprite.material.opacity = 0;
            wordsGroup.add(wordSprite);
        }

        camera.position.set(0, 1.5, 7);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            saturn.rotation.y += 0.0015;
            ringGroup.rotation.y += 0.0004;

            const dist = camera.position.distanceTo(scene.position);
            
            if (dist < 5.0) {
                // CERCA: Ver palabras y bajar intensidad de estrellas
                starsGroup.children.forEach(s => s.material.opacity = 0.3);
                wordsGroup.children.forEach(w => w.material.opacity = 1);
            } else {
                // LEJOS: Brillo total de estrellas y ocultar palabras
                starsGroup.children.forEach(s => s.material.opacity = 1);
                wordsGroup.children.forEach(w => w.material.opacity = 0);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
