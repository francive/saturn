<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const textureLoader = new THREE.TextureLoader();

    // 1. FONDO DE ESTRELLAS (Mejorado)
    const skyGeom = new THREE.SphereGeometry(150, 32, 32);
    const skyTexture = textureLoader.load('estrellas.jpg');
    skyTexture.wrapS = skyTexture.wrapT = THREE.RepeatWrapping;
    skyTexture.repeat.set(4, 4); // Menos repeticiones = estrellas un poco más visibles
    const skyMat = new THREE.MeshBasicMaterial({ map: skyTexture, side: THREE.BackSide });
    scene.add(new THREE.Mesh(skyGeom, skyMat));

    // 2. SATURNO
    const saturn = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshBasicMaterial({ map: textureLoader.load('saturno.jpg') })
    );
    scene.add(saturn);

    // 3. SHADER DE GLOW (BRILLO ATMOSFÉRICO)
    // Este código "rodea" al planeta con un aura de luz real
    const vertexShader = `
        varying vec3 vNormal;
        void main() {
            vNormal = normalize( normalMatrix * normal );
            gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
        }
    `;
    const fragmentShader = `
        varying vec3 vNormal;
        void main() {
            float intensity = pow( 0.7 - dot( vNormal, vec3( 0.0, 0.0, 1.0 ) ), 4.0 ); 
            gl_FragColor = vec4( 1.0, 0.8, 0.6, 1.0 ) * intensity;
        }
    `;

    const glowMesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 64, 64), // Un poco más grande que Saturno
        new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending,
            transparent: true
        })
    );
    scene.add(glowMesh);

    // 4. DESTELLO CENTRAL (Sprite más grande)
    const glowTexture = textureLoader.load('destello.png');
    const glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
        map: glowTexture,
        color: 0xffcc99,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    }));
    glowSprite.scale.set(6, 6, 1); // ¡Doble de tamaño!
    scene.add(glowSprite);

    // 5. ANILLO DE ESTRELLAS (Más visibles)
    const particleGroup = new THREE.Group();
    const particleWordsGroup = new THREE.Group();
    scene.add(particleGroup, particleWordsGroup);

    const starMat = new THREE.SpriteMaterial({ 
        map: glowTexture, 
        transparent: true, 
        blending: THREE.AdditiveBlending,
        depthWrite: false 
    });

    for (let i = 0; i < 900; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 1.6 + Math.random() * 2.8;
        const star = new THREE.Sprite(starMat);
        // Estrellas más grandes y variadas
        const s = Math.random() * 0.06 + 0.02; 
        star.scale.set(s, s, 4);
        star.position.set(Math.cos(angle) * radius, (Math.random()-0.5)*0.3, Math.sin(angle) * radius);
        particleGroup.add(star);
    }

    // 6. PALABRAS
    const words = ["Amor", "Te amo", "Juntos", "Siempre", "Eterno", "Bonita", "Mi Vida", "17-05-22"];
    words.forEach((text, index) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        ctx.font = 'Bold 45px Arial';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.fillText(text, 128, 45);

        const wordSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
            map: new THREE.CanvasTexture(canvas), 
            transparent: true 
        }));
        const angle = (index / words.length) * Math.PI * 2;
        wordSprite.position.set(Math.cos(angle) * 2.0, (Math.random()-0.5)*0.2, Math.sin(angle) * 2.0);
        wordSprite.scale.set(0.7, 0.22, 1);
        wordSprite.material.opacity = 0;
        particleWordsGroup.add(wordSprite);
    });

    camera.position.z = 6;
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        saturn.rotation.y += 0.002;
        particleGroup.rotation.y += 0.0008;
        particleWordsGroup.rotation.y += 0.0008;

        // Efecto latido en el brillo
        const time = Date.now() * 0.002;
        glowSprite.scale.set(5.5 + Math.sin(time) * 0.5, 5.5 + Math.sin(time) * 0.5, 1);

        const dist = camera.position.distanceTo(scene.position);
        if (dist < 4.2) {
            particleGroup.children.forEach(s => s.material.opacity = 0);
            particleWordsGroup.children.forEach(w => w.material.opacity = 1);
        } else {
            particleGroup.children.forEach(s => s.material.opacity = 1);
            particleWordsGroup.children.forEach(w => w.material.opacity = 0);
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
