<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

    // 1. ESCENA, CÁMARA Y RENDER
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. LUCES (Aumentamos la ambiental para que Saturno no se vea oscuro)
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.8);
    scene.add(ambientLight);

    // 3. CARGADOR DE TEXTURAS
    const textureLoader = new THREE.TextureLoader();

    // 4. FONDO DE ESTRELLAS (SKYSHELL) - ¡SOLUCIÓN 3: Más estrellas y mejor escala!
    // Usaremos una esfera mucho más grande y repetiremos la textura para que no se vea ampliada
    const skyGeom = new THREE.SphereGeometry(200, 32, 32); // Esfera más grande
    const skyTexture = textureLoader.load('estrellas.jpg');
    // Esto hace que la textura sea más pequeña y se repita
    skyTexture.wrapS = THREE.RepeatWrapping;
    skyTexture.wrapT = THREE.RepeatWrapping;
    skyTexture.repeat.set(4, 4); // Repetir 4 veces en cada eje

    const skyMat = new THREE.MeshBasicMaterial({ map: skyTexture, side: THREE.BackSide });
    const skySphere = new THREE.Mesh(skyGeom, skyMat);
    scene.add(skySphere);

    // 5. SATURNO (EL PLANETA)
    const saturnGeom = new THREE.SphereGeometry(1, 64, 64);
    const saturnMap = textureLoader.load('saturno.jpg');
    const saturnMat = new THREE.MeshBasicMaterial({ map: saturnMap });
    const saturn = new THREE.Mesh(saturnGeom, saturnMat);
    scene.add(saturn);

    // 6. EFECTO GLOW (EL BRILLO ALREDEDOR) - ¡SOLUCIÓN 1: MODO DE FUSIÓN ADDITIVE!
    const glowTexture = textureLoader.load('destello.png');
    // AdditiveBlending hace que el negro sea transparente y solo sume la luz
    const glowMat = new THREE.SpriteMaterial({ 
        map: glowTexture, 
        color: 0xffcc99, // Un tono ocre suave
        transparent: true, 
        blending: THREE.AdditiveBlending // ¡ESTO QUITA EL FONDO NEGRO!
    });
    const glowSprite = new THREE.Sprite(glowMat);
    glowSprite.scale.set(3, 3, 1); // Prueba el tamaño aquí
    scene.add(glowSprite);

    // 7. ANILLO DE PALABRAS Y ESTRELLAS - ¡SOLUCIÓN 2: Cientos de palabras distribuidas!
    const particleGroup = new THREE.Group();
    const particleWordsGroup = new THREE.Group();
    scene.add(particleGroup);
    scene.add(particleWordsGroup);

    // 800 estrellas para la vista lejana (usamos el mismo destello con AdditiveBlending)
    const starMat = new THREE.SpriteMaterial({ 
        map: glowTexture, 
        transparent: true, 
        blending: THREE.AdditiveBlending // ¡También quita el fondo aquí!
    });

    for (let i = 0; i < 800; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 1.6 + Math.random() * 2.5; 
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = (Math.random() - 0.5) * 0.3;

        const star = new THREE.Sprite(starMat);
        const s = Math.random() * 0.03 + 0.01; // Tamaño variado
        star.scale.set(s, s, 1);
        star.position.set(x, y, z);
        particleGroup.add(star);
    }

    // LISTA DE PALABRAS (Ahora crearemos cientos)
    const rawWords = ["Amor", "Te amo", "Juntos", "Siempre", "Camila", "Eterno", "Bonita", "Mi Vida", "Universo", "17-05-22", "Feliz", "Estrella", "Nuestra Historia", "Para Siempre", "✨"];
    // Aumentamos la cantidad repitiendo la lista
    const finalWords = [];
    for(let i=0; i<30; i++) { // Repetir 30 veces para tener cientos de palabras
        finalWords.push(...rawWords);
    }

    // Crear las palabras como Sprites distribuidos
    finalWords.forEach((text, index) => {
        // Distribución en espiral o aleatoria dentro del anillo
        const angle = (index / finalWords.length) * Math.PI * 2; 
        const radius = 1.7 + Math.random() * 2.2; // Más dispersas
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        // Ajustar el tamaño del texto para palabras más largas
        ctx.font = 'Bold 40px Arial';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.fillText(text, 128, 45);

        const txtTexture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: txtTexture, transparent: true });
        const wordSprite = new THREE.Sprite(spriteMat);
        
        // Posicionarlas en 3D
        wordSprite.position.set(Math.cos(angle) * radius, (Math.random()-0.5)*0.2, Math.sin(angle) * radius);
        // Hacerlas más pequeñas para que quepan muchas
        wordSprite.scale.set(0.5, 0.15, 1);
        wordSprite.material.opacity = 0; // Ocultas al inicio
        particleWordsGroup.add(wordSprite);
    });

    camera.position.z = 5;
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 8. ANIMACIÓN ÚNICA (Corregida la lógica del zoom)
    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        saturn.rotation.y += 0.003;
        particleGroup.rotation.y += 0.001;
        particleWordsGroup.rotation.y += 0.001;

        // Lógica de Zoom: Distancia cámara-planeta
        const dist = camera.position.distanceTo(scene.position);
        
        // --- Transición más suave ---
        if (dist < 3.8) {
            // CERCA: Ver palabras (opacity=1), ocultar estrellas (opacity=0)
            particleGroup.children.forEach(s => s.material.opacity = 0);
            particleWordsGroup.children.forEach(w => w.material.opacity = 1);
        } else {
            // LEJOS: Ver estrellas (opacity=1), ocultar palabras (opacity=0)
            particleGroup.children.forEach(s => s.material.opacity = 1);
            particleWordsGroup.children.forEach(w => w.material.opacity = 0);
        }

        renderer.render(scene, camera);
    }

    animate();

    // Ajuste de ventana
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
