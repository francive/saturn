<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo para Ti</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader();

        // 1. FONDO DE ESTRELLAS (SKYSHELL) - ¡SOLUCIÓN DE ESCALA!
        const skyGeom = new THREE.SphereGeometry(200, 32, 32); // Esfera más grande
        const skyTexture = textureLoader.load('estrellas.jpg', (tex) => {
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(8, 8); // Repetir 8 veces para que las estrellas sean pequeñas y nítidas
        });
        const skyMat = new THREE.MeshBasicMaterial({ map: skyTexture, side: THREE.BackSide });
        const skySphere = new THREE.Mesh(skyGeom, skyMat);
        scene.add(skySphere);

        // 2. SATURNO (EL PLANETA)
        const saturnGeom = new THREE.SphereGeometry(1, 64, 64);
        const saturnMap = textureLoader.load('saturno.jpg');
        const saturnMat = new THREE.MeshBasicMaterial({ map: saturnMap });
        const saturn = new THREE.Mesh(saturnGeom, saturnMat);
        scene.add(saturn);

        // 3. BRILLO (GLOW) - Código estable para imagen defectuosa
        const glowTexture = textureLoader.load('destello.png');
        const glowMat = new THREE.SpriteMaterial({ 
            map: glowTexture, 
            color: 0xffcc99, // Un tono ocre suave
            transparent: true, 
            opacity: 0.9, // Ajustamos opacidad para que no tape todo
            blending: THREE.AdditiveBlending, // Esto suma colores y elimina el negro
            depthWrite: false
        });
        const glowSprite = new THREE.Sprite(glowMat);
        glowSprite.scale.set(3.5, 3.5, 1); 
        scene.add(glowSprite);

        // 4. ANILLO DE PALABRAS Y ESTRELLAS (ESTABLE Y LLENO)
        const particleGroup = new THREE.Group();
        const particleWordsGroup = new THREE.Group();
        scene.add(particleGroup);
        scene.add(particleWordsGroup);

        const starMat = new THREE.SpriteMaterial({ 
            map: glowTexture, 
            transparent: true, 
            blending: THREE.AdditiveBlending, 
            depthWrite: false
        });

        // Crear 1200 estrellas brillantes para la vista lejana
        for (let i = 0; i < 1200; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.6 + Math.random() * 3.0; // Anillo más ancho
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = (Math.random() - 0.5) * 0.4;

            const star = new THREE.Sprite(starMat);
            const s = Math.random() * 0.03 + 0.01;
            star.scale.set(s, s, 1);
            star.position.set(x, y, z);
            particleGroup.add(star);
        }

        // Crear 200 palabras de amor distribuidas
        const rawWords = ["Amor", "Te amo", "Camila", "Juntos", "Siempre", "17-05-22", "Eterno", "Bonita", "Mi Vida", "Francis Designs", "Universo", "✨"];
        for(let i=0; i<200; i++) {
            const text = rawWords[i % rawWords.length];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.font = 'Bold 40px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.fillText(text, 128, 45);

            const txtTexture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: txtTexture, transparent: true });
            const wordSprite = new THREE.Sprite(spriteMat);
            
            const angle = (i / 200) * Math.PI * 2; 
            const radius = 1.7 + Math.random() * 2.8; 
            wordSprite.position.set(Math.cos(angle) * radius, (Math.random()-0.5)*0.25, Math.sin(angle) * radius);
            wordSprite.scale.set(0.4, 0.12, 1);
            wordSprite.material.opacity = 0; // Ocultas al inicio
            particleWordsGroup.add(wordSprite);
        }

        camera.position.z = 6; // Vista un poco más lejana al inicio
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 5. ANIMACIÓN ÚNICA
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            saturn.rotation.y += 0.003;
            particleGroup.rotation.y += 0.001;
            particleWordsGroup.rotation.y += 0.001;

            // Lógica de Zoom: Distancia cámara-planeta
            const dist = camera.position.distanceTo(scene.position);
            
            // Transición suave basada en la distancia
            if (dist < 4.5) {
                // CERCA: Ver palabras, ocultar estrellas
                particleGroup.children.forEach(s => s.material.opacity = 0);
                particleWordsGroup.children.forEach(w => w.material.opacity = 1);
            } else {
                // LEJOS: Ver estrellas, ocultar palabras
                particleGroup.children.forEach(s => s.material.opacity = 1);
                particleWordsGroup.children.forEach(w => w.material.opacity = 0);
            }

            renderer.render(scene, camera);
        }

        animate();

        // Ajuste de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
