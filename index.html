<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo para Ti</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        // Escena, Cámara y Render
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Luz
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const sunLight = new THREE.PointLight(0xffffff, 1);
        sunLight.position.set(10, 5, 10);
        scene.add(sunLight);

        // Saturno (Esfera)
        const saturnGeom = new THREE.SphereGeometry(1, 64, 64);
        const textureLoader = new THREE.TextureLoader();
        // Usamos una textura genérica de internet para que funcione de una vez
        const saturnMap = textureLoader.load('saturno.jpg');
        const saturnMat = new THREE.MeshBasicMaterial({ map: saturnMap });
        const saturn = new THREE.Mesh(saturnGeom, saturnMat);
        scene.add(saturn);

        // Anillo de Palabras (Como Estrellas)
        const words = ["Amor", "Siempre", "Juntos", "Te Amo", "Mundo", "Eterno", "Bonita", "Mi Vida"];
        const particleGroup = new THREE.Group();
        
        for (let i = 0; i < 200; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.5 + Math.random() * 1;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = (Math.random() - 0.5) * 0.1;

            // En lugar de texto pesado, usamos puntos que parecen estrellas
            const starGeom = new THREE.SphereGeometry(0.01, 8, 8);
            const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const star = new THREE.Mesh(starGeom, starMat);
            star.position.set(x, y, z);
            particleGroup.add(star);
        }
        scene.add(particleGroup);

        camera.position.z = 4;
        const controls = new OrbitControls(camera, renderer.domElement);

        // Animación
        function animate() {
            requestAnimationFrame(animate);
            saturn.rotation.y += 0.005;
            particleGroup.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
