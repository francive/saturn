<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo para Ti - Mejorado</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #audio-container {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1); padding: 10px;
            border-radius: 8px; backdrop-filter: blur(5px);
            color: white; z-index: 100; display: flex;
            align-items: center; gap: 10px; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        input[type=range] { cursor: pointer; }
    </style>
</head>
<body>

    <div id="audio-container">
        <label for="volumeRange">Volumen</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="backgroundAudio" loop>
        <source src="saturnaudio.MP3" type="audio/mpeg">
    </audio>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();

        const audio = document.getElementById('backgroundAudio');
        const volumeSlider = document.getElementById('volumeRange');
        window.addEventListener('click', () => { audio.play(); }, { once: true });
        volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });

        // 1. FONDO
        const bgTexture = textureLoader.load('estrellas.jpg'); 
        const bgPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 120),
            new THREE.MeshBasicMaterial({ map: bgTexture, transparent: true, depthWrite: false })
        );
        scene.add(bgPlane);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. SATURNO Y ATMÓSFERA
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshBasicMaterial({ map: textureLoader.load('saturno.jpg') })
        );
        scene.add(saturn);

        const atmosGlowMat = new THREE.ShaderMaterial({
            vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize( normalMatrix * normal ); gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`,
            fragmentShader: `varying vec3 vNormal; void main() { float intensity = pow( 0.6 - dot( vNormal, vec3( 0.0, 0.0, 1.0 ) ), 4.0 ); gl_FragColor = vec4( 1.0, 0.9, 0.7, 1.0 ) * intensity; }`,
            side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true
        });
        const atmosGlow = new THREE.Mesh(new THREE.SphereGeometry(1.35, 64, 64), atmosGlowMat);
        scene.add(atmosGlow);

        // 3. GRUPOS
        const ringGroup = new THREE.Group();
        const starsGroup = new THREE.Group();
        const wordsGroup = new THREE.Group();
        ringGroup.rotation.x = Math.PI * 0.15; // Inclinación de 25-30 grados aprox
        scene.add(ringGroup);
        ringGroup.add(starsGroup, wordsGroup);

        // --- CAMBIO CLAVE: RingGeometry para que no atraviese el planeta ---
        const glowRingGeo = new THREE.RingGeometry(1.4, 5.5, 64); 
        const glowRingMat = new THREE.ShaderMaterial({
            uniforms: { color: { value: new THREE.Color(0xFFD700) } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`,
            fragmentShader: `uniform vec3 color; varying vec2 vUv; void main() { 
                float dist = distance(vUv, vec2(0.5, 0.5)); 
                float alpha = smoothstep(0.5, 0.2, dist) * 0.7; 
                vec3 finalColor = mix(vec3(1.0, 0.8, 0.3), color, smoothstep(0.3, 0.5, dist)); 
                gl_FragColor = vec4(finalColor, alpha); 
            }`,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide
        });

        const glowRing = new THREE.Mesh(glowRingGeo, glowRingMat);
        glowRing.rotation.x = Math.PI / 2; // Lo acostamos para que el grupo lo incline
        glowRing.position.y = -0.05; 
        ringGroup.add(glowRing);

        // PARTÍCULAS
        const starMat = new THREE.SpriteMaterial({ 
            map: textureLoader.load('destello.png'), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false 
        });
        for (let i = 0; i < 4000; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.pow(Math.random(), 0.5) * 3.8; 
            const star = new THREE.Sprite(starMat.clone());
            const s = Math.random() * 0.08 + 0.02; 
            star.scale.set(s, s, 1);
            star.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 0.15, Math.sin(angle) * radius);
            starsGroup.add(star);
        }

        // PALABRAS
        const loveWords = ["Infinito", "Destino", "Magia", "Luz", "Cielo", "Vida", "Tesoro", "Eternidad", "Suspiro", "Latido", "Universo", "Alma", "Poesía", "Sueño", "Dulzura", "Pasión", "Ternura", "Compromiso", "Refugio", "Paz", "Felicidad", "Amanecer", "Estrella", "Milagro", "Gracia", "Encanto", "Adoración", "Lealtad", "Sinceridad", "Abrazo", "Beso", "Calma", "Fuego", "Unión", "Raíz", "Brillo", "Anhelo", "Valentía", "Cuidado", "Respeto", "Incondicional", "Mundo"];
        for(let i = 0; i < 400; i++) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.shadowColor = "white"; ctx.shadowBlur = 8;
            ctx.font = 'Bold 38px Georgia'; ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'center';
            ctx.fillText(loveWords[i % loveWords.length], 128, 45);
            const word = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.6 + Math.random() * 3.0;
            word.position.set(Math.cos(angle) * radius, 0.1, Math.sin(angle) * radius);
            word.scale.set(0.2, 0.06, 1); 
            word.material.opacity = 0;
            wordsGroup.add(word);
        }

        // ESTRELLAS FUGACES
        const shootingStars = [];
        function spawnShootingStar() {
            const star = new THREE.Sprite(new THREE.SpriteMaterial({ map: textureLoader.load('destello.png'), blending: THREE.AdditiveBlending, transparent: true, depthWrite: false }));
            star.position.set((Math.random()-0.5)*150, (Math.random()-0.5)*100, -45); 
            star.scale.set(6, 0.3, 1); 
            star.userData = { vel: new THREE.Vector3((Math.random()-0.5)*15, (Math.random()-0.5)*10, 0), op: 1.0 };
            scene.add(star); shootingStars.push(star);
        }

        camera.position.set(0, 3, 10);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            saturn.rotation.y += 0.001;
            ringGroup.rotation.y += 0.0003;

            const vector = new THREE.Vector3(0, 0, -50).applyQuaternion(camera.quaternion);
            bgPlane.position.copy(camera.position).add(vector);
            bgPlane.quaternion.copy(camera.quaternion);

            shootingStars.forEach((s, i) => {
                s.position.add(s.userData.vel); s.userData.op -= 0.02; s.material.opacity = s.userData.op;
                if(s.userData.op <= 0) { scene.remove(s); shootingStars.splice(i, 1); }
            });
            if (Math.random() < 0.012) spawnShootingStar();

            const dist = camera.position.distanceTo(scene.position);
            wordsGroup.children.forEach(w => w.material.opacity = dist < 7.5 ? 1 : 0);
            starsGroup.children.forEach(s => s.material.opacity = dist < 7.5 ? 0.3 : 1);

            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
