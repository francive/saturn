<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Un Universo para Ti</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();

        // 1. FONDO PLANO INFINITO
        const bgTexture = textureLoader.load('estrellas.jpg');
        const bgGeometry = new THREE.PlaneGeometry(200, 120);
        const bgMaterial = new THREE.MeshBasicMaterial({ 
            map: bgTexture, 
            transparent: true, 
            opacity: 0.7,
            depthTest: false // Para que siempre esté detrás de todo
        });
        const backgroundPlane = new THREE.Mesh(bgGeometry, bgMaterial);
        scene.add(backgroundPlane);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. SATURNO
        const saturn = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 64, 64),
            new THREE.MeshBasicMaterial({ map: textureLoader.load('saturno.jpg') })
        );
        scene.add(saturn);

        // 3. ANILLO VOLUMÉTRICO (20 CAPAS)
        const ringGroup = new THREE.Group();
        const starsGroup = new THREE.Group();
        const wordsGroup = new THREE.Group();
        ringGroup.rotation.x = Math.PI * 0.15; 
        scene.add(ringGroup);
        ringGroup.add(starsGroup, wordsGroup);

        const starMat = new THREE.SpriteMaterial({ 
            map: textureLoader.load('destello.png'), 
            transparent: true, 
            blending: THREE.AdditiveBlending,
            depthWrite: false 
        });

        // Generamos partículas en 20 "niveles" de altura y radio sutiles
        const numCapas = 20;
        const particulasPorCapa = 150;

        for (let j = 0; j < numCapas; j++) {
            for (let i = 0; i < particulasPorCapa; i++) {
                const angle = Math.random() * Math.PI * 2;
                // Variación de radio por capa
                const radius = 2.0 + Math.random() * 3.0; 
                const star = new THREE.Sprite(starMat);
                
                // Variación de altura (Y) muy pequeña para dar volumen
                const yPos = (Math.random() - 0.5) * 0.15;
                
                const s = Math.random() * 0.06 + 0.02; 
                star.scale.set(s, s, 1);
                star.position.set(Math.cos(angle) * radius, yPos, Math.sin(angle) * radius);
                
                // Color levemente cálido/blanco
                star.material.color.setHSL(0.1, 0.1, 0.8 + Math.random() * 0.2);
                starsGroup.add(star);
            }
        }

        // 4. BANCO DE PALABRAS
        const loveWords = ["Infinito", "Destino", "Magia", "Luz", "Cielo", "Vida", "Tesoro", "Esencia", "Eternidad", "Suspiro", "Latido", "Universo", "Alma", "Poesía", "Sueño", "Dulzura", "Pasión", "Ternura", "Compromiso", "Refugio", "Paz", "Felicidad", "Amanecer", "Estrella", "Milagro", "Gracia", "Encanto", "Adoración", "Lealtad", "Sinceridad", "Abrazo", "Beso", "Calma", "Fuego", "Unión", "Raíz", "Brillo", "Anhelo", "Valentía", "Cuidado", "Respeto", "Incondicional", "Mundo"];

        for(let i = 0; i < 400; i++) {
            const randomText = loveWords[Math.floor(Math.random() * loveWords.length)];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.font = 'Bold 38px Georgia';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.fillText(randomText, 128, 45);

            const wordSprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: new THREE.CanvasTexture(canvas), 
                transparent: true,
                blending: THREE.AdditiveBlending
            }));

            const angle = Math.random() * Math.PI * 2;
            const radius = 2.4 + Math.random() * 2.6;
            wordSprite.position.set(Math.cos(angle) * radius, (Math.random()-0.5) * 0.1, Math.sin(angle) * radius);
            wordSprite.scale.set(0.18, 0.05, 1); 
            wordSprite.material.opacity = 0;
            wordsGroup.add(wordSprite);
        }

        camera.position.set(0, 2, 8);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            saturn.rotation.y += 0.001;
            ringGroup.rotation.y += 0.0003;

            // EL FONDO SIGUE A LA CÁMARA
            // Lo posicionamos detrás de la escena siempre mirando a la cámara
            const vector = new THREE.Vector3(0, 0, -50); // 50 unidades de distancia
            vector.applyQuaternion(camera.quaternion);
            backgroundPlane.position.copy(camera.position).add(vector);
            backgroundPlane.quaternion.copy(camera.quaternion);

            const dist = camera.position.distanceTo(scene.position);
            if (dist < 6.5) {
                starsGroup.children.forEach(s => s.material.opacity = 0.4);
                wordsGroup.children.forEach(w => w.material.opacity = 1);
            } else {
                starsGroup.children.forEach(s => s.material.opacity = 1);
                wordsGroup.children.forEach(w => w.material.opacity = 0);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
